name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          PATH_TO_APP=$(find . -name "pubspec.yaml" -exec dirname {} \;)
          cd $PATH_TO_APP
          flutter pub get
          
      - name: Build APK
        run: |
          PATH_TO_APP=$(find . -name "pubspec.yaml" -exec dirname {} \;)
          cd $PATH_TO_APP
          flutter build apk --debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Noor-App-APK
          path: "**/*.apk"
