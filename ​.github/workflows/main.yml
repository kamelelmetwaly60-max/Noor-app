name: Build APK
on: 
  push:
    branches:
      - master
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: |
          cd artifacts/noor-app
          flutter pub get
          flutter build apk --debug
      - uses: actions/upload-artifact@v3
        with:
          name: My-App-APK
          path: artifacts/noor-app/build/app/outputs/flutter-apk/app-debug.apk
 
